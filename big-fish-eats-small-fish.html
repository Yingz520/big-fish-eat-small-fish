<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>大鱼吃小鱼</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Fredoka+One&display=swap');

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    user-select: none;
  }

  body {
    overflow: hidden;
    background: #001021;
    font-family: 'ZCOOL KuaiLe', 'Fredoka One', cursive;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    width: 100vw;
  }

  #game-container {
    position: relative;
    width: 100vw;
    height: 100vh;
  }

  #gameCanvas {
    display: block;
    width: 100%;
    height: 100%;
    cursor: none;
  }

  #hud {
    position: absolute;
    top: 20px;
    left: 20px;
    display: none;
    gap: 20px;
    z-index: 10;
  }

  .hud-item {
    background: rgba(0, 30, 60, 0.85);
    border: 2px solid rgba(0, 180, 255, 0.6);
    border-radius: 12px;
    padding: 10px 18px;
    color: #00e5ff;
    font-size: 18px;
    text-shadow: 0 0 10px rgba(0, 229, 255, 0.5);
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255,255,255,0.1);
  }

  .hud-item span {
    color: #ffeb3b;
    font-weight: bold;
  }

  #start-screen, #gameover-screen {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 20;
    background: radial-gradient(ellipse at center, #0a2a4a 0%, #000818 100%);
  }

  #start-screen h1, #gameover-screen h1 {
    font-size: 64px;
    color: #00e5ff;
    text-shadow: 0 0 30px rgba(0, 229, 255, 0.8), 0 0 60px rgba(0, 229, 255, 0.4);
    margin-bottom: 30px;
    animation: titleGlow 2s ease-in-out infinite alternate;
  }

  #gameover-screen h1 {
    color: #ff5252;
    text-shadow: 0 0 30px rgba(255, 82, 82, 0.8), 0 0 60px rgba(255, 82, 82, 0.4);
  }

  @keyframes titleGlow {
    from { transform: scale(1); }
    to { transform: scale(1.05); }
  }

  .info-box {
    background: rgba(0, 40, 80, 0.9);
    border: 2px solid rgba(0, 180, 255, 0.4);
    border-radius: 16px;
    padding: 25px 35px;
    margin-bottom: 30px;
    max-width: 500px;
    color: #b0d4f1;
    font-size: 18px;
    line-height: 2;
    text-align: center;
  }

  .info-box strong {
    color: #ffeb3b;
  }

  .final-score {
    font-size: 48px;
    color: #ffeb3b;
    text-shadow: 0 0 20px rgba(255, 235, 59, 0.7);
    margin: 20px 0;
  }

  .btn {
    background: linear-gradient(135deg, #0077b6, #00b4d8);
    color: white;
    border: none;
    border-radius: 30px;
    padding: 15px 50px;
    font-size: 24px;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.3s ease;
    box-shadow: 0 6px 20px rgba(0, 119, 182, 0.5);
    text-shadow: 0 2px 4px rgba(0,0,0,0.3);
  }

  .btn:hover {
    transform: translateY(-3px) scale(1.05);
    box-shadow: 0 10px 30px rgba(0, 119, 182, 0.7);
    background: linear-gradient(135deg, #00b4d8, #48cae4);
  }

  .btn:active {
    transform: translateY(0) scale(0.98);
  }

  .btn.restart {
    background: linear-gradient(135deg, #e63946, #ff6b6b);
    box-shadow: 0 6px 20px rgba(230, 57, 70, 0.5);
  }

  .btn.restart:hover {
    background: linear-gradient(135deg, #ff6b6b, #ff8787);
    box-shadow: 0 10px 30px rgba(230, 57, 70, 0.7);
  }

  #level-bar {
    position: absolute;
    top: 70px;
    left: 20px;
    width: 200px;
    height: 8px;
    background: rgba(0, 40, 80, 0.8);
    border-radius: 4px;
    display: none;
    z-index: 10;
    overflow: hidden;
  }

  #level-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #00e5ff, #ffeb3b);
    border-radius: 4px;
    transition: width 0.3s ease;
  }

  #custom-cursor {
    position: fixed;
    width: 30px;
    height: 30px;
    border: 2px solid rgba(255, 255, 255, 0.5);
    border-radius: 50%;
    pointer-events: none;
    z-index: 9999;
    transform: translate(-50%, -50%);
    display: none;
  }

  .fish-icons {
    display: flex;
    gap: 20px;
    margin: 15px 0;
  }

  .fish-icon {
    font-size: 32px;
  }
</style>
</head>
<body>
<div id="game-container">
  <canvas id="gameCanvas"></canvas>

  <div id="hud">
    <div class="hud-item">🐟 分数: <span id="score-display">0</span></div>
    <div class="hud-item">⭐ 等级: <span id="level-display">1</span></div>
  </div>

  <div id="level-bar">
    <div id="level-fill"></div>
  </div>

  <div id="start-screen">
    <h1>🐠 大鱼吃小鱼 🐟</h1>
    <div class="info-box">
      <strong>游戏说明</strong><br>
      🎮 使用 <strong>方向键/WASD</strong> 或 <strong>鼠标点击</strong> 控制鱼的移动<br>
      🍽️ 吃掉比你 <strong>小</strong> 的鱼来成长<br>
      ⚠️ 避开比你 <strong>大</strong> 的鱼，否则会被吃掉！<br>
      📈 体型越大，能吃的鱼越多<br>
      <div class="fish-icons">
        <span class="fish-icon">🐟</span>
        <span class="fish-icon">🐠</span>
        <span class="fish-icon">🐡</span>
        <span class="fish-icon">🦈</span>
      </div>
      <strong>从弱小的鱼儿成长为海洋霸主！</strong>
    </div>
    <button class="btn" id="start-btn">开始游戏</button>
  </div>

  <div id="gameover-screen" style="display: none;">
    <h1>💀 游戏结束</h1>
    <div class="info-box">
      你被一条更大的鱼吃掉了！<br>
      但你的成长之路令人惊叹！
    </div>
    <div class="final-score">最终分数: <span id="final-score">0</span></div>
    <div class="info-box" id="final-level-info">
      最终等级: <span id="final-level">1</span>
    </div>
    <button class="btn restart" id="restart-btn">再来一次</button>
  </div>

  <div id="custom-cursor"></div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

let W, H;

function resizeCanvas() {
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W;
  canvas.height = H;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// Game states
const STATES = { START: 'start', PLAYING: 'playing', GAMEOVER: 'gameover' };
let gameState = STATES.START;

// Player
let player = {
  x: 0, y: 0,
  size: 20,
  baseSpeed: 4,
  speed: 4,
  score: 0,
  level: 1,
  levelProgress: 0,
  levelThreshold: 5,
  angle: 0,
  tailPhase: 0,
  color: '#FFD700',
  targetX: null,
  targetY: null
};

// NPC fish
let npcs = [];
let spawnTimer = 0;
let spawnInterval = 60;
let gameTime = 0;

// Particles & effects
let particles = [];
let bubbles = [];

// Keys
let keys = {};
window.addEventListener('keydown', e => {
  keys[e.key.toLowerCase()] = true;
});
window.addEventListener('keyup', e => {
  keys[e.key.toLowerCase()] = false;
});

// Mouse
let mouseX = W / 2, mouseY = H / 2;
canvas.addEventListener('mousemove', e => {
  mouseX = e.clientX;
  mouseY = e.clientY;
  const cursor = document.getElementById('custom-cursor');
  if (gameState === STATES.PLAYING) {
    cursor.style.display = 'block';
    cursor.style.left = e.clientX + 'px';
    cursor.style.top = e.clientY + 'px';
  }
});

canvas.addEventListener('click', e => {
  if (gameState === STATES.PLAYING) {
    player.targetX = e.clientX;
    player.targetY = e.clientY;
  }
});

// Buttons
document.getElementById('start-btn').addEventListener('click', startGame);
document.getElementById('restart-btn').addEventListener('click', startGame);

function startGame() {
  gameState = STATES.PLAYING;
  document.getElementById('start-screen').style.display = 'none';
  document.getElementById('gameover-screen').style.display = 'none';
  document.getElementById('hud').style.display = 'flex';
  document.getElementById('level-bar').style.display = 'block';

  player = {
    x: W / 2,
    y: H / 2,
    size: 20,
    baseSpeed: 4,
    speed: 4,
    score: 0,
    level: 1,
    levelProgress: 0,
    levelThreshold: 5,
    angle: 0,
    tailPhase: 0,
    color: '#FFD700',
    targetX: null,
    targetY: null
  };

  npcs = [];
  particles = [];
  spawnTimer = 0;
  spawnInterval = 60;
  gameTime = 0;

  initBubbles();
  updateHUD();
}

function gameOver() {
  gameState = STATES.GAMEOVER;
  document.getElementById('hud').style.display = 'none';
  document.getElementById('level-bar').style.display = 'none';
  document.getElementById('gameover-screen').style.display = 'flex';
  document.getElementById('final-score').textContent = player.score;
  document.getElementById('final-level').textContent = player.level;
  document.getElementById('custom-cursor').style.display = 'none';

  createExplosion(player.x, player.y, player.color, 30);
}

function initBubbles() {
  bubbles = [];
  for (let i = 0; i < 20; i++) {
    bubbles.push(createBubble(true));
  }
}

function createBubble(randomY) {
  return {
    x: Math.random() * W,
    y: randomY ? Math.random() * H : H + 20,
    size: Math.random() * 8 + 2,
    speed: Math.random() * 1 + 0.5,
    opacity: Math.random() * 0.3 + 0.1,
    wobble: Math.random() * Math.PI * 2,
    wobbleSpeed: Math.random() * 0.05 + 0.02
  };
}

function spawnNPC() {
  const levelMultiplier = 1 + (player.level - 1) * 0.3;
  const sizeRange = {
    min: 8,
    max: Math.max(player.size * 2.5, 80 * levelMultiplier)
  };

  const size = Math.random() * (sizeRange.max - sizeRange.min) + sizeRange.min;

  const sizeCategory = size < 20 ? 'tiny' :
    size < 35 ? 'small' :
    size < 55 ? 'medium' :
    size < 80 ? 'large' : 'huge';

  const colorMap = {
    tiny: { body: '#7FFFD4', fin: '#00CED1' },
    small: { body: '#98FB98', fin: '#3CB371' },
    medium: { body: '#FFB6C1', fin: '#FF69B4' },
    large: { body: '#DDA0DD', fin: '#9370DB' },
    huge: { body: '#FF6347', fin: '#DC143C' }
  };

  const colors = colorMap[sizeCategory];
  const baseSpeed = (Math.random() * 2 + 1) * (size < player.size ? 1.2 : 0.8);
  const speed = baseSpeed * (1 + player.level * 0.1);

  const fromLeft = Math.random() > 0.5;
  const y = Math.random() * (H - 100) + 50;

  npcs.push({
    x: fromLeft ? -size * 2 : W + size * 2,
    y: y,
    size: size,
    speed: speed,
    direction: fromLeft ? 1 : -1,
    color: colors,
    category: sizeCategory,
    tailPhase: Math.random() * Math.PI * 2,
    alive: true
  });
}

function createExplosion(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = Math.random() * 5 + 2;
    particles.push({
      x: x,
      y: y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      size: Math.random() * 6 + 2,
      color: color,
      life: 1,
      decay: Math.random() * 0.03 + 0.02
    });
  }
}

function createEatEffect(x, y, color) {
  for (let i = 0; i < 12; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = Math.random() * 3 + 1;
    particles.push({
      x: x,
      y: y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      size: Math.random() * 4 + 1,
      color: color,
      life: 1,
      decay: Math.random() * 0.04 + 0.03
    });
  }
}

function updateHUD() {
  document.getElementById('score-display').textContent = player.score;
  document.getElementById('level-display').textContent = player.level;
  const fillPercent = (player.levelProgress / player.levelThreshold) * 100;
  document.getElementById('level-fill').style.width = fillPercent + '%';
}

function levelUp() {
  player.level++;
  player.levelProgress = 0;
  player.levelThreshold = Math.floor(player.levelThreshold * 1.5);
  player.baseSpeed = Math.min(4 + player.level * 0.3, 8);
  spawnInterval = Math.max(30, 60 - player.level * 3);

  createExplosion(player.x, player.y, '#FFD700', 20);
  updateHUD();
}

function checkCollision(a, b) {
  const dx = a.x - b.x;
  const dy = a.y - b.y;
  const dist = Math.sqrt(dx * dx + dy * dy);
  return dist < (a.size + b.size) * 0.7;
}

function drawBackground() {
  const gradient = ctx.createLinearGradient(0, 0, 0, H);
  gradient.addColorStop(0, '#001832');
  gradient.addColorStop(0.5, '#00284d');
  gradient.addColorStop(1, '#001028');
  ctx.fillStyle = gradient;
  ctx.fillRect(0, 0, W, H);

  // Light rays
  ctx.save();
  ctx.globalAlpha = 0.08;
  for (let i = 0; i < 5; i++) {
    const x = W * 0.2 + i * W * 0.15;
    ctx.beginPath();
    ctx.moveTo(x - 30, 0);
    ctx.lineTo(x + 60, H);
    ctx.lineTo(x - 60, H);
    ctx.closePath();
    ctx.fillStyle = '#48cae4';
    ctx.fill();
  }
  ctx.restore();
}

function drawBubbles() {
  bubbles.forEach(b => {
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.size, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255, 255, 255, ${b.opacity})`;
    ctx.fill();

    ctx.beginPath();
    ctx.arc(b.x - b.size * 0.3, b.y - b.size * 0.3, b.size * 0.3, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255, 255, 255, ${b.opacity * 1.5})`;
    ctx.fill();
  });
}

function updateBubbles() {
  bubbles.forEach(b => {
    b.y -= b.speed;
    b.wobble += b.wobbleSpeed;
    b.x += Math.sin(b.wobble) * 0.5;
    if (b.y < -20) {
      Object.assign(b, createBubble(false));
    }
  });
}

function drawFish(fish, isPlayer) {
  ctx.save();
  ctx.translate(fish.x, fish.y);

  const angle = isPlayer ? player.angle : (fish.direction > 0 ? 0 : Math.PI);
  ctx.rotate(angle);

  const s = fish.size;
  const tailWag = Math.sin(fish.tailPhase) * 0.3;

  // Glow effect for player
  if (isPlayer) {
    ctx.shadowColor = fish.color;
    ctx.shadowBlur = 20;
  }

  // Tail
  ctx.save();
  ctx.rotate(tailWag);
  ctx.beginPath();
  ctx.moveTo(-s * 0.8, 0);
  ctx.lineTo(-s * 1.5, -s * 0.6);
  ctx.lineTo(-s * 1.5, s * 0.6);
  ctx.closePath();
  ctx.fillStyle = isPlayer ? '#FFA500' : fish.color.fin;
  ctx.fill();
  ctx.restore();

  // Body
  ctx.beginPath();
  ctx.ellipse(0, 0, s, s * 0.6, 0, 0, Math.PI * 2);
  ctx.fillStyle = isPlayer ? fish.color : fish.color.body;
  ctx.fill();

  // Body highlight
  ctx.beginPath();
  ctx.ellipse(s * 0.1, -s * 0.15, s * 0.7, s * 0.25, -0.2, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
  ctx.fill();

  // Top fin
  ctx.beginPath();
  ctx.moveTo(s * 0.1, -s * 0.55);
  ctx.quadraticCurveTo(s * 0.3, -s * 0.9, s * 0.6, -s * 0.55);
  ctx.fillStyle = isPlayer ? '#FF8C00' : fish.color.fin;
  ctx.fill();

  // Bottom fin
  ctx.beginPath();
  ctx.moveTo(s * 0.2, s * 0.55);
  ctx.quadraticCurveTo(s * 0.35, s * 0.8, s * 0.55, s * 0.55);
  ctx.fillStyle = isPlayer ? '#FF8C00' : fish.color.fin;
  ctx.fill();

  // Side fins
  ctx.save();
  const finWag = Math.sin(fish.tailPhase * 1.5) * 0.2;
  ctx.rotate(finWag);
  ctx.beginPath();
  ctx.ellipse(-s * 0.1, s * 0.45, s * 0.25, s * 0.12, 0.3, 0, Math.PI * 2);
  ctx.fillStyle = isPlayer ? '#FFA500' : fish.color.fin;
  ctx.fill();
  ctx.restore();

  // Eye
  ctx.beginPath();
  ctx.arc(s * 0.5, -s * 0.1, s * 0.18, 0, Math.PI * 2);
  ctx.fillStyle = '#fff';
  ctx.fill();

  ctx.beginPath();
  ctx.arc(s * 0.55, -s * 0.1, s * 0.1, 0, Math.PI * 2);
  ctx.fillStyle = '#000';
  ctx.fill();

  ctx.beginPath();
  ctx.arc(s * 0.57, -s * 0.13, s * 0.04, 0, Math.PI * 2);
  ctx.fillStyle = '#fff';
  ctx.fill();

  // Mouth
  ctx.beginPath();
  ctx.arc(s * 0.85, s * 0.1, s * 0.12, -0.5, 0.5);
  ctx.strokeStyle = 'rgba(0, 0, 0, 0.6)';
  ctx.lineWidth = 2;
  ctx.stroke();

  // Player special markings
  if (isPlayer) {
    // Crown-like spots on top
    for (let i = 0; i < 3; i++) {
      ctx.beginPath();
      ctx.arc(-s * 0.3 + i * s * 0.3, -s * 0.4, s * 0.08, 0, Math.PI * 2);
      ctx.fillStyle = '#FF6347';
      ctx.fill();
    }

    // Level indicator ring
    ctx.beginPath();
    ctx.arc(0, 0, s * 1.1, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(255, 215, 0, ${0.3 + Math.sin(gameTime * 0.05) * 0.2})`;
    ctx.lineWidth = 2;
    ctx.stroke();
  }

  ctx.restore();
}

function drawParticles() {
  particles.forEach(p => {
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
    ctx.fillStyle = p.color;
    ctx.globalAlpha = p.life;
    ctx.fill();
    ctx.globalAlpha = 1;
  });
}

function updateParticles() {
  particles = particles.filter(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.life -= p.decay;
    return p.life > 0;
  });
}

function updatePlayer() {
  let dx = 0, dy = 0;

  if (keys['arrowup'] || keys['w']) dy = -1;
  if (keys['arrowdown'] || keys['s']) dy = 1;
  if (keys['arrowleft'] || keys['a']) dx = -1;
  if (keys['arrowright'] || keys['d']) dx = 1;

  if (dx !== 0 || dy !== 0) {
    player.targetX = null;
    player.targetY = null;
    const len = Math.sqrt(dx * dx + dy * dy);
    player.x += (dx / len) * player.baseSpeed;
    player.y += (dy / len) * player.baseSpeed;
    player.angle = Math.atan2(dy, dx);
  } else if (player.targetX !== null && player.targetY !== null) {
    const tdx = player.targetX - player.x;
    const tdy = player.targetY - player.y;
    const dist = Math.sqrt(tdx * tdx + tdy * tdy);

    if (dist > 5) {
      const speed = Math.min(player.baseSpeed, dist * 0.08);
      player.x += (tdx / dist) * speed;
      player.y += (tdy / dist) * speed;
      player.angle = Math.atan2(tdy, tdx);
    } else {
      player.targetX = null;
      player.targetY = null;
    }
  }

  // Clamp to screen
  player.x = Math.max(player.size, Math.min(W - player.size, player.x));
  player.y = Math.max(player.size, Math.min(H - player.size, player.y));

  player.tailPhase += 0.15;
}

function updateNPCs() {
  spawnTimer++;
  if (spawnTimer >= spawnInterval) {
    spawnNPC();
    spawnTimer = 0;
  }

  npcs.forEach(npc => {
    npc.x += npc.speed * npc.direction;
    npc.tailPhase += 0.12;
  });

  // Remove off-screen and check collisions
  npcs = npcs.filter(npc => {
    const isOffScreen = (npc.direction > 0 && npc.x > W + npc.size * 3) ||
      (npc.direction < 0 && npc.x < -npc.size * 3);

    if (isOffScreen) return false;

    if (npc.alive && checkCollision(player, npc)) {
      if (npc.size < player.size * 0.9) {
        // Eat small fish
        npc.alive = false;
        const points = Math.ceil(npc.size / 5);
        player.score += points;
        player.size += npc.size * 0.05;
        player.levelProgress++;

        createEatEffect(npc.x, npc.y, npc.color.body);

        if (player.levelProgress >= player.levelThreshold) {
          levelUp();
        }

        updateHUD();
        return false;
      } else if (npc.size > player.size * 1.1) {
        // Eaten by big fish
        gameOver();
        return false;
      }
    }

    return npc.alive !== false;
  });
}

function drawSizeIndicator() {
  if (gameState !== STATES.PLAYING) return;

  // Draw a subtle size comparison indicator near player
  ctx.save();
  ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
  ctx.font = '12px "ZCOOL KuaiLe", cursive';
  ctx.textAlign = 'center';
  ctx.fillText(`体型: ${player.size.toFixed(0)}`, player.x, player.y - player.size - 20);
  ctx.restore();
}

function drawTargetIndicator() {
  if (gameState !== STATES.PLAYING || player.targetX === null) return;

  ctx.save();
  ctx.beginPath();
  ctx.arc(player.targetX, player.targetY, 15, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
  ctx.lineWidth = 2;
  ctx.stroke();

  ctx.beginPath();
  ctx.arc(player.targetX, player.targetY, 5, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
  ctx.fill();
  ctx.restore();
}

// Seaweed decoration
let seaweeds = [];
function initSeaweeds() {
  seaweeds = [];
  for (let i = 0; i < 8; i++) {
    seaweeds.push({
      x: Math.random() * W,
      height: Math.random() * 80 + 40,
      segments: Math.floor(Math.random() * 4 + 4),
      phase: Math.random() * Math.PI * 2,
      color: `hsl(${120 + Math.random() * 40}, 60%, ${20 + Math.random() * 15}%)`
    });
  }
}
initSeaweeds();
window.addEventListener('resize', () => {
  resizeCanvas();
  initSeaweeds();
});

function drawSeaweeds() {
  seaweeds.forEach(sw => {
    ctx.save();
    ctx.strokeStyle = sw.color;
    ctx.lineWidth = 6;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(sw.x, H);

    for (let i = 0; i <= sw.segments; i++) {
      const t = i / sw.segments;
      const y = H - t * sw.height;
      const wobble = Math.sin(gameTime * 0.03 + sw.phase + t * 2) * 10 * t;
      ctx.lineTo(sw.x + wobble, y);
    }

    ctx.stroke();
    ctx.restore();
  });
}

// Main game loop
function gameLoop() {
  drawBackground();
  drawSeaweeds();
  updateBubbles();
  drawBubbles();

  if (gameState === STATES.PLAYING) {
    gameTime++;
    updatePlayer();
    updateNPCs();
    updateParticles();

    npcs.forEach(npc => {
      if (npc.alive) drawFish(npc, false);
    });

    drawFish(player, true);
    drawTargetIndicator();
    drawSizeIndicator();
    drawParticles();
  } else if (gameState === STATES.GAMEOVER) {
    updateParticles();
    drawParticles();
  }

  requestAnimationFrame(gameLoop);
}

gameLoop();
</script>
